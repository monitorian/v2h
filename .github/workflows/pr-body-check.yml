name: PR Body Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  pr-body-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR body
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || "";

            const requiredSections = [
              "## Hardware Impact",
              "## CI Cannot Verify",
              "## Human Review Points"
            ];

            const missing = requiredSections.filter(s => !body.includes(s));

            if (missing.length > 0) {
              core.setFailed(`Missing required PR sections: ${missing.join(", ")}`);
            }

            const ciCannotVerify = body.match(/## CI Cannot Verify\s*([\s\S]*?)(\n## |$)/);
            if (!ciCannotVerify || ciCannotVerify[1].trim().length < 10) {
              core.setFailed("CI Cannot Verify section must be filled.");
            }

            const humanReview = body.match(/## Human Review Points\s*([\s\S]*?)(\n## |$)/);
            if (!humanReview || humanReview[1].trim().length < 10) {
              core.setFailed("Human Review Points section must be filled.");
            }
